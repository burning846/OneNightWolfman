# Render.com Blueprint
# 文档：https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wolf-server
    runtime: node
    rootDir: server
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false        # 仪表盘里手动填前端域名
      # 用户系统（可选）。Neon 免费 Postgres 是最方便的选择：
      #   1. https://neon.tech 注册一个项目，拿 connection string
      #   2. 把 connection string 填进 Render 的 DATABASE_URL
      #   3. 用 `openssl rand -hex 32` 生成一个 JWT_SECRET 填进去
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
